<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0f0f23">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>OmniChat - دردشة ذكية</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- شاشة الترحيب -->
    <div id="splash-screen" class="splash-screen">
        <div class="splash-content">
            <div class="splash-logo">
                <svg viewBox="0 0 100 100" class="logo-svg">
                    <defs>
                        <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#6366f1"/>
                            <stop offset="50%" style="stop-color:#8b5cf6"/>
                            <stop offset="100%" style="stop-color:#ec4899"/>
                        </linearGradient>
                    </defs>
                    <circle cx="50" cy="50" r="45" fill="none" stroke="url(#logoGrad)" stroke-width="4"/>
                    <path d="M30 50 Q40 30 50 50 T70 50" fill="none" stroke="url(#logoGrad)" stroke-width="4" stroke-linecap="round"/>
                    <circle cx="35" cy="40" r="5" fill="url(#logoGrad)"/>
                    <circle cx="65" cy="40" r="5" fill="url(#logoGrad)"/>
                </svg>
            </div>
            <h1 class="splash-title">OmniChat</h1>
            <p class="splash-subtitle">دردشة ذكية متعددة الوسائط</p>
            <div class="splash-loader">
                <div class="loader-bar"></div>
            </div>
        </div>
    </div>

    <!-- التطبيق الرئيسي -->
    <div id="app" class="app hidden">
        <!-- الهيدر -->
        <header class="app-header">
            <div class="header-left">
                <button class="icon-btn menu-btn" id="menuBtn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="3" y1="6" x2="21" y2="6"/>
                        <line x1="3" y1="12" x2="21" y2="12"/>
                        <line x1="3" y1="18" x2="21" y2="18"/>
                    </svg>
                </button>
            </div>
            <div class="header-center">
                <div class="chat-avatar">
                    <img src="https://api.dicebear.com/7.x/bottts/svg?seed=OmniBot" alt="Bot">
                    <span class="online-indicator"></span>
                </div>
                <div class="chat-info">
                    <h2>المساعد الذكي</h2>
                    <span class="status-text">متصل الآن</span>
                </div>
            </div>
            <div class="header-right">
                <button class="icon-btn" id="searchBtn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"/>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                    </svg>
                </button>
                <button class="icon-btn" id="moreBtn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="5" r="1" fill="currentColor"/>
                        <circle cx="12" cy="12" r="1" fill="currentColor"/>
                        <circle cx="12" cy="19" r="1" fill="currentColor"/>
                    </svg>
                </button>
            </div>
        </header>

        <!-- منطقة الرسائل -->
        <main class="chat-container" id="chatContainer">
            <div class="messages-wrapper" id="messagesWrapper">
                <!-- رسالة ترحيب -->
                <div class="message system-message">
                    <div class="system-bubble">
                        <span class="system-icon">👋</span>
                        <p>مرحباً بك في OmniChat! يمكنك إرسال نصوص، صور، ملفات، وفيديوهات.</p>
                        <span class="system-time">اليوم</span>
                    </div>
                </div>
            </div>
        </main>

        <!-- معاينة الوسائط -->
        <div id="mediaPreview" class="media-preview hidden">
            <div class="preview-header">
                <span>معاينة الملف</span>
                <button class="icon-btn close-preview" id="closePreview">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <div class="preview-content" id="previewContent"></div>
            <div class="preview-caption">
                <input type="text" id="captionInput" placeholder="أضف تعليقاً... (اختياري)">
                <button class="send-media-btn" id="sendMediaBtn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="22" y1="2" x2="11" y2="13"/>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                    </svg>
                </button>
            </div>
        </div>

        <!-- شريط الكتابة -->
        <footer class="input-bar">
            <div class="input-wrapper">
                <button class="attach-btn" id="attachBtn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/>
                    </svg>
                </button>

                <div class="text-input-container">
                    <textarea 
                        id="messageInput" 
                        placeholder="اكتب رسالتك..." 
                        rows="1"
                        dir="auto"
                    ></textarea>
                    <button class="emoji-btn" id="emojiBtn">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"/>
                            <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
                            <line x1="9" y1="9" x2="9.01" y2="9"/>
                            <line x1="15" y1="9" x2="15.01" y2="9"/>
                        </svg>
                    </button>
                </div>

                <button class="send-btn" id="sendBtn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="22" y1="2" x2="11" y2="13"/>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                    </svg>
                </button>
            </div>
        </footer>

        <!-- قائمة المرفقات -->
        <div id="attachMenu" class="attach-menu hidden">
            <div class="attach-grid">
                <button class="attach-item" data-type="image">
                    <div class="attach-icon gallery">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="18" height="18" rx="2"/>
                            <circle cx="8.5" cy="8.5" r="1.5"/>
                            <path d="M21 15l-5-5L5 21"/>
                        </svg>
                    </div>
                    <span>صورة</span>
                </button>
                <button class="attach-item" data-type="camera">
                    <div class="attach-icon camera">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/>
                            <circle cx="12" cy="13" r="4"/>
                        </svg>
                    </div>
                    <span>كاميرا</span>
                </button>
                <button class="attach-item" data-type="video">
                    <div class="attach-icon video">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polygon points="23 7 16 12 23 17 23 7"/>
                            <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
                        </svg>
                    </div>
                    <span>فيديو</span>
                </button>
                <button class="attach-item" data-type="file">
                    <div class="attach-icon file">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
                            <polyline points="14 2 14 8 20 8"/>
                            <line x1="16" y1="13" x2="8" y2="13"/>
                            <line x1="16" y1="17" x2="8" y2="17"/>
                            <polyline points="10 9 9 9 8 9"/>
                        </svg>
                    </div>
                    <span>ملف</span>
                </button>
                <button class="attach-item" data-type="audio">
                    <div class="attach-icon audio">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/>
                            <path d="M19 10v2a7 7 0 01-14 0v-2"/>
                            <line x1="12" y1="19" x2="12" y2="23"/>
                            <line x1="8" y1="23" x2="16" y2="23"/>
                        </svg>
                    </div>
                    <span>تسجيل</span>
                </button>
                <button class="attach-item" data-type="location">
                    <div class="attach-icon location">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/>
                            <circle cx="12" cy="10" r="3"/>
                        </svg>
                    </div>
                    <span>موقع</span>
                </button>
            </div>
        </div>

        <!-- مدخل الملفات المخفي -->
        <input type="file" id="fileInput" accept="*/*" style="display:none">
        <input type="file" id="imageInput" accept="image/*" capture="environment" style="display:none">
        <input type="file" id="videoInput" accept="video/*" style="display:none">
        <input type="file" id="cameraInput" accept="image/*" capture="camera" style="display:none">

        <!-- القائمة الجانبية -->
        <div id="sideMenu" class="side-menu">
            <div class="side-menu-overlay"></div>
            <div class="side-menu-content">
                <div class="side-menu-header">
                    <div class="user-avatar">
                        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=User" alt="User">
                    </div>
                    <div class="user-info">
                        <h3>المستخدم</h3>
                        <span>+213 555 123 456</span>
                    </div>
                </div>
                <nav class="side-menu-nav">
                    <a href="#" class="nav-item active">
                        <span class="nav-icon">💬</span>
                        <span>الدردشات</span>
                    </a>
                    <a href="#" class="nav-item">
                        <span class="nav-icon">📁</span>
                        <span>الملفات</span>
                    </a>
                    <a href="#" class="nav-item">
                        <span class="nav-icon">🖼️</span>
                        <span>الصور</span>
                    </a>
                    <a href="#" class="nav-item">
                        <span class="nav-icon">🎬</span>
                        <span>الفيديوهات</span>
                    </a>
                    <a href="#" class="nav-item">
                        <span class="nav-icon">⚙️</span>
                        <span>الإعدادات</span>
                    </a>
                </nav>
                <div class="side-menu-footer">
                    <p>OmniChat v1.0</p>
                    <p>© 2026 Chibani Lotfi</p>
                </div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script src="js/chat.js"></script>
    <script src="js/media.js"></script>
</body>
</html>
